name: Deploy to Docker

on:
  push:
    pull_request:
      target: main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # Checkout the code from the repository
      - name: Checkout code
        uses: actions/checkout@v2

      # Set up Docker
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v1

      # Log in to DockerHub (or any other container registry)
      - name: Log in to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Build and push Docker images for dev environment
      - name: Build and push Docker images (dev)
        run: |
          docker-compose -f docker-compose.dev.yml build
          docker-compose -f docker-compose.dev.yml push

      # Deploy to the dev server
      - name: Deploy to dev server
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh -o StrictHostKeyChecking=no user@demo 'docker-compose -f /path/to/docker-compose.dev.yml pull && docker-compose -f /path/to/docker-compose.dev.yml up -d'

      # Optional: Clean up unused Docker images
      - name: Clean up unused Docker images
        run: docker system prune -f
